<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.esm.js"></script>
    <script nomodule src="https://cdn.jsdelivr.net/npm/@ionic/core/dist/ionic/ionic.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@ionic/core/css/ionic.bundle.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <title>Obligatorio_MR-342455</title>
</head>

<body>
    <ion-app>
        <ion-router id="ruteo">
            <ion-route url="/" component="page-home"></ion-route>
            <ion-route url="/Login" component="page-login"></ion-route>
            <ion-route url="/Registro" component="page-registro"></ion-route>
            <ion-route url="/AgregarUnaPelícula" component="page-altapelicula"></ion-route>
            <ion-route url="/ListarPeliculas" component="page-ListarPeliculas"></ion-route>
            <ion-route url="/MapaUsuarios" component="page-page-Mapa"></ion-route>
            <style>
                #map {
                    height: 680px;
                }
            </style>
        </ion-router>
        <ion-nav></ion-nav>
        <ion-menu content-id="main-content" id="menu">
            <ion-header>
                <ion-toolbar>
                    <ion-buttons slot="start">
                        <ion-menu-button></ion-menu-button>
                    </ion-buttons>
                    <ion-title>Menu</ion-title>
                </ion-toolbar>
            </ion-header>
            <ion-content class="ion-padding">
                <!-- Seccion de menu hamburgesa. aca se agregan los elementos nuevos  -->
                <ion-list>
                    <ion-item href="/" id="" onclick="CerrarMenu()">
                        <ion-label>Inicio</ion-label>
                    </ion-item>
                    <ion-item href="/Login" id="BtnMenuNavLogin" onclick="CerrarMenu()">
                        <ion-label>Login</ion-label>
                    </ion-item>
                    <ion-item href="/Registro" id="BtnMenuNavRegistro" onclick="CerrarMenu()">
                        <ion-label>Registro</ion-label>
                    </ion-item>
                    <ion-item href="/AgregarUnaPelícula" id="BtnMenuNavAltaPelicula" onclick="CerrarMenu()">
                        <ion-label>Agregar una película</ion-label>
                    </ion-item>
                    <ion-item href="/ListarPeliculas" id="BtnMenuNavListarPelicula" onclick="CerrarMenu()">
                        <ion-label>Lista de peliculas</ion-label>
                    </ion-item>
                    <ion-item href="/MapaUsuarios" id="BtnMenuNavMapaUsuarios" onclick="CerrarMenu()">
                        <ion-label>Mapa de usuarios</ion-label>
                    </ion-item>
                    <ion-item href="/" id="BtnMenuNavLogOut" onclick="Logout(); CerrarMenu()">
                        <ion-label>Logout</ion-label>
                    </ion-item>
                </ion-list>
            </ion-content>
        </ion-menu>
        <div id="main-content"></div>
        <ion-page class="ion-page" id="page-Home">
            <ion-header>
                <ion-toolbar>
                    <ion-buttons slot="start">
                        <ion-menu-button></ion-menu-button>
                    </ion-buttons>
                    <ion-title>Inicio</ion-title>
                </ion-toolbar>
            </ion-header>
            <ion-content>
                HolaPrueba de inicio
            </ion-content>
        </ion-page>
        <ion-page class="ion-page" id="page-Registro">
            <ion-header>
                <ion-toolbar>
                    <ion-buttons slot="start">
                        <ion-menu-button></ion-menu-button>
                    </ion-buttons>
                    <ion-title>Registro</ion-title>
                </ion-toolbar>
            </ion-header>
            <ion-content>
                <ion-list>
                    <ion-list>
                        <ion-item>
                            <ion-input label="Usuario" placeholder="Nombre de usuario" id="InpUsuario"></ion-input>
                        </ion-item>

                        <ion-item>
                            <ion-input label="Contraseña" type="password" value="" id="InpPWD"></ion-input>
                        </ion-item>
                        <ion-list>
                            <ion-item>
                                <ion-select aria-label="Fruit" interface="modal" placeholder="Seleccione un país"
                                    id="SltPais">
                                </ion-select>
                            </ion-item>
                        </ion-list>
                        <ion-item>
                            <ion-button color="primary" id="BtnRegistrar">Registrar</ion-button>
                        </ion-item>
                    </ion-list>
                </ion-list>
            </ion-content>
        </ion-page>
        <ion-page class="ion-page" id="page-Login">
            <ion-header>
                <ion-toolbar>
                    <ion-buttons slot="start">
                        <ion-menu-button></ion-menu-button>
                    </ion-buttons>
                    <ion-title>Login</ion-title>
                </ion-toolbar>
            </ion-header>
            <ion-content>
                <ion-list>
                    <ion-item>
                        <ion-input label="Usuario" placeholder="Nombre de usuario" id="InpUsuarioLogin"></ion-input>
                    </ion-item>

                    <ion-item>
                        <ion-input label="Contraseña" type="password" value="" id="InpPWDLogin"></ion-input>
                    </ion-item>
                    <ion-item slot="">
                        <ion-button color="primary" id="BtnLogin">Iniciar Sesion</ion-button>
                    </ion-item>
                </ion-list>
            </ion-content>
        </ion-page>

        <ion-page class="ion-page" id="page-AltaPelicula">
            <ion-header>
                <ion-toolbar>
                    <ion-buttons slot="start">
                        <ion-menu-button></ion-menu-button>
                    </ion-buttons>
                    <ion-title>Agregar una pelicula vista</ion-title>
                </ion-toolbar>
            </ion-header>
            <ion-content>
                <ion-list>
                    <ion-list>
                        <ion-item>
                            <ion-input label="NombrePelicular" placeholder="Pelicula"
                                id="InpPeliculaAgregar"></ion-input>
                        </ion-item>

                        <ion-item>
                            <ion-input label="Fecha" type="date" value="" id="InpFechaPelAgregar"></ion-input>
                        </ion-item>
                        <ion-item>
                            <ion-select aria-label="Fruit" interface="modal" placeholder="Seleccione una categoria"
                                id="SltCategorias">
                            </ion-select>
                        </ion-item>

                        <ion-item>
                            <ion-textarea id="InpComentario" label="Comentario" placeholder="Agregue un comentario"
                                auto-grow="true" label-placement="floating" fill="outline" value="">
                            </ion-textarea>
                        </ion-item>
                        <ion-item slot="start">
                            <ion-button color="primary" id="BtnAltaPelicula">Agregar</ion-button>
                        </ion-item>
                    </ion-list>
                </ion-list>
            </ion-content>
        </ion-page>

        <ion-page class="ion-page" id="page-ListarPeliculas">
            <ion-header>
                <ion-toolbar>
                    <ion-buttons slot="start">
                        <ion-menu-button></ion-menu-button>
                    </ion-buttons>
                    <ion-title slot="start">Listado de pelicula</ion-title>
                    
                </ion-toolbar>
            </ion-header>
            <ion-content >
                <ion-item lines="none" class="filtro-item">
                    <ion-icon name="filter-outline" slot="start"></ion-icon>
                    <ion-label position="stacked">Filtrar por fecha</ion-label>
                    <ion-select id="SltFiltroFecha" interface="popover" onchange="ListarPeliculas()">
                        <ion-select-option value="todas">Todas</ion-select-option>
                        <ion-select-option value="semana">Última semana</ion-select-option>
                        <ion-select-option value="mes">Último mes</ion-select-option>
                    </ion-select>
                </ion-item>

                <div id="ListaPeliculas"></div>
            </ion-content>
        </ion-page>
        <ion-page class="ion-page" id="page-Mapa">
            <ion-header>
                <ion-toolbar>
                    <ion-buttons slot="start">
                        <ion-menu-button></ion-menu-button>
                    </ion-buttons>
                    <ion-title>Mapa de usuarios</ion-title>
                </ion-toolbar>
            </ion-header>
            <ion-content>
                <h1>Mapa</h1>
                <div id="map"></div>
            </ion-content>
        </ion-page>
    </ion-app>
</body>
<script src="JS/Codigo.js"></script>
<script src="capacitor.js"></script>

</html>
